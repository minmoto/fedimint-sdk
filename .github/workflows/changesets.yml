name: Changesets

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml

  changesets:
    name: Publish Changesets
    needs: verify
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    runs-on: macos-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build React Native Bindings
        uses: ./.github/actions/build-react-native
        timeout-minutes: 90

      - name: Build WASM
        uses: ./.github/actions/build-wasm

      - name: Install and build packages
        run: |
          nix develop --accept-flake-config --command bash << 'EOF'
            pnpm install
            pnpm build
            pnpm build:reactnative
          EOF

      - name: Re-apply React Native Checksums
        run: |
          cd packages/react-native-bindings
          node -e "const pkg = require('./package.json'); pkg.checksums={android:'${{ env.ANDROID_SHA256 }}',ios:'${{ env.IOS_SHA256 }}'}; require('fs').writeFileSync('package.json',JSON.stringify(pkg,null,2)+'\n')"
          cd ../..

      - name: PR or Publish to NPM
        id: changesets
        uses: changesets/action@v1
        timeout-minutes: 10
        with:
          publish: nix develop --accept-flake-config -c bash -c "export CI=true; pnpm changeset:verify-publish-manifests; pnpm changeset publish"
          createGithubReleases: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get React Native Bindings Version
        if: steps.changesets.outputs.published == 'true'
        id: rn_version
        run: echo "version=$(node -p 'require("./packages/react-native-bindings/package.json").version')" >> $GITHUB_OUTPUT

      - name: Upload Artifacts to Release (Stable)
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packages/react-native-bindings/android-artifacts.zip
            packages/react-native-bindings/ios-artifacts.zip
          tag_name: react-native-v${{ steps.rn_version.outputs.version }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish prerelease
        # Only publish a prerelease if we didn't publish a release
        if: steps.changesets.outputs.published != 'true'
        continue-on-error: true
        timeout-minutes: 10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          nix develop --accept-flake-config -c bash -c '
            export CI=true
            npm config set "//registry.npmjs.org/:_authToken" "$NPM_TOKEN"
            git reset --hard origin/main
            pnpm clean
            pnpm changeset version --no-git-tag --snapshot canary

            # Re-apply checksums (action exported them to env)
            cd packages/react-native-bindings
            node -e "const pkg = require(\"./package.json\"); pkg.checksums={android:\"$ANDROID_SHA256\",ios:\"$IOS_SHA256\"}; require(\"fs\").writeFileSync(\"package.json\",JSON.stringify(pkg,null,2)+\"\\n\")"
            patch -p0 --forward < patches/snapshot_version.patch || true
            cd ../..

            pnpm changeset:verify-publish-manifests
            pnpm build
            pnpm build:reactnative
            pnpm changeset publish --no-git-tag --snapshot canary --tag canary
          '

      - name: Upload Artifacts to Release (Canary)
        if: steps.changesets.outputs.published != 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packages/react-native-bindings/android-artifacts.zip
            packages/react-native-bindings/ios-artifacts.zip
          tag_name: canary
          name: Canary Release
          prerelease: true
