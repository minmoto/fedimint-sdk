name: Deploy React Native Packages

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build and Publish React Native Packages
    permissions:
      contents: write
      id-token: write
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build WASM (dependency of types)
        uses: ./.github/actions/build-wasm

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Build types package
        run: pnpm --filter @fedimint/types build

      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install ubrn CLI
        run: |
          cargo install --git https://github.com/merbridge/ubrn.git

      - name: Build React Native packages
        run: |
          cd packages/react-native
          pnpm ubrn:ios
          pnpm ubrn:android

      - name: Configure npm registry
        run: |
          npm config set "//registry.npmjs.org/:_authToken" "$NPM_TOKEN"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @fedimint/react-native
        run: |
          cd packages/react-native
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @fedimint/transport-react-native
        run: |
          cd packages/transport-react-native
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
