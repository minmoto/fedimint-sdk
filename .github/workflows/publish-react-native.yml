name: Publish React Native Packages

on:
  push:
    branches:
      - main
      - toby/run-workflow
    paths:
      - 'packages/react-native/**'
      - '.github/workflows/publish-react-native.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure npm for publishing
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim, x86_64-apple-ios-sim

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/react-native/rust_modules
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/react-native/ubrn.config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build workspace dependencies
        run: |
          # Build workspace dependencies that the packages might need
          pnpm run --filter "@fedimint/types" build || true

      - name: Publish @fedimint/react-native
        working-directory: packages/react-native
        run: |
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
